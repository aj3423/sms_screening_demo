name: new_release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: "oracle"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_SIGNING_KEY }}
        run: |
          echo "$ENCODED_STRING" > "$RUNNER_TEMP/keystore-b64.txt"
          base64 -d "$RUNNER_TEMP/keystore-b64.txt" > "$RUNNER_TEMP/release-keystore.jks"

      - name: Build release APKs
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :demo_sms_app:assembleRelease :sms_screening_provider:assembleRelease

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          DEMO_APK="$(find demo_sms_app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort | tail -n 1)"
          PROVIDER_APK="$(find sms_screening_provider/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort | tail -n 1)"

          if [ -z "$DEMO_APK" ]; then
            echo "demo_sms_app release APK not found"
            find demo_sms_app/build/outputs -maxdepth 4 -type f | sort || true
            exit 1
          fi

          if [ -z "$PROVIDER_APK" ]; then
            echo "sms_screening_provider release APK not found"
            find sms_screening_provider/build/outputs -maxdepth 4 -type f | sort || true
            exit 1
          fi

          cp "$DEMO_APK" release-artifacts/demo_sms_app-release.apk
          cp "$PROVIDER_APK" release-artifacts/sms_screening_provider-release.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          preserve_order: true
          name: "test"
          tag_name: "test"
          generate_release_notes: true
          files: |
            release-artifacts/demo_sms_app-release.apk
            release-artifacts/sms_screening_provider-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
